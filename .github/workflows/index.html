
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USAMA OS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="bootScreen">
<div class="bootLogo">USAMA OS</div>
<div class="bootBar"><div id="bootProgress"></div></div>
</div>

<div id="lockScreen">
<div id="lockTime"></div>
<div id="lockDate"></div>
<button id="unlockBtn">Unlock</button>
</div>

<div id="desktop">

<div id="topBar" class="glass">
<span id="sysTime"></span>
<span>📶</span>
<span>🔋</span>
<span>🔔</span>
<span id="aiOpen">🤖</span>
</div>

<div class="icon" data-app="notes">📝 Notes</div>
<div class="icon" data-app="calculator">🧮 Calculator</div>
<div class="icon" data-app="terminal">💻 Terminal</div>
<div class="icon" data-app="browser">🌐 Browser</div>

<div id="dock" class="glass">
<span class="dockIcon" data-app="notes">📝</span>
<span class="dockIcon" data-app="calculator">🧮</span>
<span class="dockIcon" data-app="browser">🌐</span>
<span class="dockIcon" data-app="settings">⚙️</span>
</div>

<div id="windows"></div>

<div id="aiPanel" class="glass hidden">
<div class="aiHeader">USAMA AI</div>
<div id="aiChat"></div>
<input id="aiInput" placeholder="Ask something...">
</div>

</div>

<script src="liquidGlass.js"></script>
<script src="windowManager.js"></script>
<script src="apps.js"></script>
<script src="ai.js"></script>

<script>
let progress=0
let bar=document.getElementById("bootProgress")

let boot=setInterval(()=>{
progress+=10
bar.style.width=progress+"%"
if(progress>=100){
clearInterval(boot)
document.getElementById("bootScreen").style.display="none"
document.getElementById("lockScreen").style.display="flex"
}
},200)

document.getElementById("unlockBtn").onclick=()=>{
document.getElementById("lockScreen").style.display="none"
document.getElementById("desktop").style.display="block"
}

setInterval(()=>{
let d=new Date()
document.getElementById("sysTime").innerText=d.toLocaleTimeString()
document.getElementById("lockTime").innerText=d.toLocaleTimeString()
document.getElementById("lockDate").innerText=d.toDateString()
},1000)
</script>

</body>
</html>
