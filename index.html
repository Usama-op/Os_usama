<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USAMA OS | Futuristic Simulator</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div id="boot-screen" class="full-screen">
<div class="boot-content">
<h1 class="logo-glow">USAMA<span>OS</span></h1>
<div class="loading-bar"><div class="progress"></div></div>
<p class="status-text">Loading Liquid Core...</p>
</div>
</div>

<div id="lock-screen" class="full-screen hidden">
<div class="lock-panel glass">
<h2 id="lock-time">00:00</h2>
<p id="lock-date">Friday, March 6</p>
<button class="unlock-btn glass" onclick="unlockSystem()">INITIALIZE SESSION</button>
</div>
</div>

<main id="desktop" class="hidden">
<header class="status-bar glass">
<div class="bar-section">
<span class="brand">USAMA</span>
<div class="search-container glass">
<i class="fas fa-search"></i>
<input type="text" id="os-search" placeholder="Search Neural Net...">
</div>
</div>
<div class="bar-section">
<i class="fas fa-wifi"></i>
<i class="fas fa-battery-three-quarters"></i>
<span id="top-time">00:00</span>
</div>
</header>

<div id="window-layer"></div>

<div class="dock-container">
<div id="main-dock" class="glass">
<div class="dock-item" onclick="openApp('terminal')" title="Terminal"><i class="fas fa-terminal"></i></div>
<div class="dock-item" onclick="openApp('notes')" title="Notes"><i class="fas fa-edit"></i></div>
<div class="dock-item" onclick="openApp('ai')" title="AI Assistant"><i class="fas fa-robot"></i></div>
<div class="dock-item" onclick="openApp('browser')" title="Browser"><i class="fas fa-globe"></i></div>
<div class="dock-item" onclick="openApp('settings')" title="Settings"><i class="fas fa-cog"></i></div>
</div>
</div>
</main>

<script src="liquidGlass.js"></script>
<script src="os.js"></script>
</body>
</html>
