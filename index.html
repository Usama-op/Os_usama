
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USAMA OS | Liquid v2.5</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body onclick="initAudio()">

<canvas id="bg-canvas"></canvas>

<div id="boot-screen" class="full-screen">
<div class="boot-logo">
<span class="u-letter">U</span>SAMA <span class="os-badge">OS</span>
</div>
<div class="loader-container">
<div class="loader-fill"></div>
</div>
<p class="boot-text">NEURAL LINK ESTABLISHED</p>
</div>

<main id="desktop" class="hidden">

<header class="status-bar glass">
<div class="bar-left">
<div class="cpu-usage"><i class="fas fa-microchip"></i> <span id="cpu-load">08%</span></div>
</div>

<div class="bar-center" id="top-time">12:00 PM</div>

<div class="bar-right">
<i class="fas fa-signal"></i>
<i class="fas fa-battery-three-quarters"></i>
<div class="user-avatar"></div>
</div>
</header>

<div id="window-layer"></div>

<div class="dock-wrapper">
<nav id="main-dock" class="glass">

<div class="dock-item" onclick="openApp('terminal')">
<i class="fas fa-terminal"></i>
</div>

<div class="dock-item" onclick="openApp('notes')">
<i class="fas fa-file-signature"></i>
</div>

<div class="dock-item ai-btn" onclick="openApp('ai')">
<i class="fas fa-atom"></i>
</div>

<div class="dock-item" onclick="openApp('browser')">
<i class="fas fa-globe-americas"></i>
</div>

<div class="dock-item" onclick="openApp('settings')">
<i class="fas fa-sliders-h"></i>
</div>

</nav>
</div>

</main>

<script src="os.js"></script>
<script src="liquidGlass.js"></script>

</body>
</html>
